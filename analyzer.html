<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Analyzer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="animated-bg"></div>

<header class="navbar">
  <h1>ResumeCraft<span>AI</span></h1>
</header>

<section class="page">
  <h2>Resume Analyzer</h2>
  <p class="subtitle">Upload your resume and get detailed skill & project feedback</p>

  <div class="upload-box">
    <p>Upload Resume (PDF)</p>
    <div class="fake-upload">Drag & Drop or Click</div>
  </div>

  <div class="analysis-grid">
    <div class="analysis-card">Skills Identified</div>
    <div class="analysis-card">Missing Skills</div>
    <div class="analysis-card">Project Feedback</div>
    <div class="analysis-card">ATS Compatibility</div>
  </div>

  <div class="score-circle">
    <svg viewBox="0 0 36 36" class="circular-chart green">
      <path class="circle-bg"
        d="M18 2.0845
           a 15.9155 15.9155 0 0 1 0 31.831
           a 15.9155 15.9155 0 0 1 0 -31.831"/>
      <path class="circle"
        stroke-dasharray="68, 100"
        d="M18 2.0845
           a 15.9155 15.9155 0 0 1 0 31.831
           a 15.9155 15.9155 0 0 1 0 -31.831"/>
      <text x="18" y="20.35" class="percentage">68%</text>
    </svg>
    <p>Internship Readiness Score</p>
  </div>

</section>

</body>
</html>
